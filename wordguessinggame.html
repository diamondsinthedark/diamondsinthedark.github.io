<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA Word Guessing Game</title>
    <link rel="stylesheet" href="wordguessinggame.css">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon_32x32.png">
</head>
<body>
<div class="pageContainer">
<div class="header">
    <h1><u>Glass Animals</u></h1>
	<h2>Word Guessing Game</h2>
</div>
<div class="gameContainer">
  <form action="javascript:;" onsubmit="onSubmit()">
    <div class="inputContainer">
      <input type="text" id="userInput" class="textbox" placeholder="type here..."/>
      <input type="submit" id="guessButton" class="button" value="guess" />
      <div class="errors" id="errorContainer" ></div>
    </div>
  </form>
  <div class="guessContainer" id="guessContainer_1">
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
  </div>
  <div class="guessContainer" id="guessContainer_2">
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
  </div>
  <div class="guessContainer" id="guessContainer_3">
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
  </div>
  <div class="guessContainer" id="guessContainer_4">
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
  </div>
  <div class="guessContainer" id="guessContainer_5">
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
    <div class="guessLetter">&nbsp;</div>
  </div>
  <div id="gameOverContainer" class="gameOverContainer">
	<div class="info" id="infoContainer" ></div>
	<input
      type="button"
      class="button"
      style="visibility:hidden"
      id="resetButton"
      value="play again"
      onclick="onReset()"
    />
  </div>
</div> <!--end game container -->
<div class="footer">  
  <p>
	<h4>All solutions are found within Glass Animals song lyrics and titles. There are over 400 distinct words you could get! Happy guessing :)</h4>
    <br/><i>created by @diamonds.inthedark <3</i>
  </p>
</div>
</div> <!--end page container -->
<script src="wordguessinggame.js"></script>
</body>
</html>
